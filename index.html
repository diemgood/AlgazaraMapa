<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>San Martín de los Llanos · Mapa Turístico</title>
<meta name="description" content="Mapa turístico interactivo de San Martín de los Llanos, Meta: monumentos, sitios turísticos, gastronomía, hospedaje y artesanos. Arma tu propio recorrido.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,650;9..144,700&family=Karla:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
:root{
  --tinta:#22301d;          /* verde monte, texto */
  --papel:#fdfaf2;          /* crema de sabana */
  --papel-2:#f4eede;
  --linea:#e3dcc8;
  --corocora:#d63d2a;       /* rojo escarlata: monumentos + ruta */
  --sabana:#2f7a4b;         /* verde: sitios turísticos */
  --atardecer:#dd8624;      /* naranja: gastronomía */
  --cielo:#2e6f92;          /* azul: hospedaje */
  --telar:#7a58a8;          /* violeta: artesanos */
  --sombra:0 10px 30px rgba(34,48,29,.18);
  --radio:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Karla',system-ui,sans-serif;color:var(--tinta);background:var(--papel);overflow:hidden}
#map{position:fixed;inset:0;z-index:1;background:#dfe8d8}
.leaflet-container{font:inherit}

/* ---------- Panel izquierdo ---------- */
#panel{
  position:fixed;z-index:1000;top:14px;left:14px;
  width:min(370px,calc(100vw - 28px));
  max-height:calc(100dvh - 28px);
  display:flex;flex-direction:column;
  background:var(--papel);border:1px solid var(--linea);
  border-radius:var(--radio);box-shadow:var(--sombra);overflow:hidden;
}
#brand{position:relative;padding:14px 16px 14px;color:#fff;
  background:linear-gradient(160deg,#2c5c3b 0%,#356b44 45%,#7a9c53 100%);
  display:flex;gap:12px;align-items:center}
#brand .horizonte{position:absolute;inset:auto 0 0 0;height:26px;opacity:.95;pointer-events:none}
#logo{width:52px;height:52px;border-radius:50%;object-fit:cover;flex:none;
  border:2px solid rgba(255,255,255,.75);box-shadow:0 3px 10px rgba(0,0,0,.3);background:#fff}
#brand .titulos{position:relative;z-index:1;min-width:0}
#brand .eyebrow{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:800;color:#f3dfae}
#brand h1{font-family:'Fraunces',serif;font-weight:650;font-size:clamp(18px,4.2vw,22px);line-height:1.1;margin-top:2px}
#brand p{font-size:11.5px;margin-top:3px;color:#e8f0dd}
#togglePanel{position:absolute;z-index:2;top:10px;right:10px;width:28px;height:28px;border-radius:9px;
  border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.14);color:#fff;
  font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
#togglePanel:hover{background:rgba(255,255,255,.26)}

#controles{padding:12px 14px 10px;border-bottom:1px solid var(--linea);background:var(--papel)}
#buscador{position:relative}
#buscador svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.45}
#q{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--linea);border-radius:11px;
  background:#fff;font:inherit;font-size:14px;color:var(--tinta)}
#q:focus{outline:2px solid var(--sabana);outline-offset:1px;border-color:transparent}
#chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.chip{--c:var(--tinta);display:inline-flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:999px;border:1.5px solid var(--linea);
  background:#fff;font:inherit;font-size:12px;font-weight:700;color:var(--tinta);cursor:pointer;
  transition:background .15s,color .15s,border-color .15s}
.chip .dot{width:8px;height:8px;border-radius:50%;background:var(--c)}
.chip .n{font-weight:400;opacity:.6}
.chip:hover{border-color:var(--c)}
.chip.on{background:var(--c);border-color:var(--c);color:#fff}
.chip.on .dot{background:#fff}
.chip.on .n{opacity:.85}
#seleccion{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px}
#seleccion .cnt{font-weight:800}
#seleccion .sep{flex:1}
#seleccion button{border:1.5px solid var(--linea);background:#fff;border-radius:9px;
  padding:5px 10px;font:inherit;font-size:12px;font-weight:700;color:var(--tinta);cursor:pointer}
#seleccion button:hover{border-color:var(--tinta)}

#lista{overflow-y:auto;flex:1;padding:8px;background:var(--papel);scrollbar-width:thin}
.tarjeta{display:grid;grid-template-columns:auto 48px 1fr;gap:10px;align-items:center;
  width:100%;text-align:left;padding:8px;border:1px solid transparent;border-radius:12px;
  background:transparent;cursor:pointer;color:inherit}
.tarjeta:hover,.tarjeta:focus-visible{background:#fff;border-color:var(--linea)}
.tarjeta.activa{background:#fff;border-color:var(--tinta)}
.tarjeta.apagada{opacity:.45}
.tarjeta input{width:17px;height:17px;accent-color:var(--sabana);cursor:pointer;flex:none}
.tarjeta img{width:48px;height:48px;object-fit:cover;border-radius:10px;background:var(--papel-2)}
.tarjeta b{display:block;font-size:13.5px;line-height:1.25}
.tarjeta small{display:flex;align-items:center;gap:5px;font-size:11px;color:#6b7562;margin-top:2px}
.tarjeta small i{width:7px;height:7px;border-radius:50%;flex:none}
#sinResultados{padding:26px 14px;text-align:center;font-size:13.5px;color:#6b7562;display:none}

#rutaBar{border-top:1px solid var(--linea);padding:10px 12px;background:var(--papel);
  display:flex;gap:8px;align-items:center}
#btnRuta{flex:1;padding:10px 12px;border-radius:11px;border:none;background:var(--corocora);
  color:#fff;font:inherit;font-size:13.5px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px}
#btnRuta:hover{filter:brightness(1.08)}
#btnRuta:disabled{background:#c9c3b2;cursor:not-allowed}
#btnQuitarRuta{display:none;padding:10px 12px;border-radius:11px;border:1.5px solid var(--linea);
  background:#fff;font:inherit;font-size:13px;font-weight:700;color:var(--tinta);cursor:pointer}
#btnQuitarRuta:hover{border-color:var(--tinta)}

#panel.mini #controles,#panel.mini #lista,#panel.mini #sinResultados,#panel.mini #rutaBar{display:none}
#panel.mini{max-height:none}

/* ---------- Marcadores ---------- */
.icnwrap{position:relative;width:56px;height:40px;filter:drop-shadow(0 3px 5px rgba(20,30,15,.45));
  transition:transform .15s;transform-origin:bottom center}
.icnwrap img{width:56px;height:40px;object-fit:contain;display:block}
.icnwrap:hover{transform:scale(1.15)}
.icnwrap.sel{transform:scale(1.2);filter:drop-shadow(0 0 6px rgba(214,61,42,.9)) drop-shadow(0 3px 5px rgba(20,30,15,.45))}
.orden{position:absolute;z-index:2;width:22px;height:22px;border-radius:50%;
  background:var(--corocora);color:#fff;border:2px solid #fff;
  display:flex;align-items:center;justify-content:center;
  font-family:'Karla',sans-serif;font-weight:800;font-size:11.5px;
  box-shadow:0 2px 6px rgba(0,0,0,.35)}
.leaflet-tooltip.tt{background:var(--tinta);color:#fff;border:none;border-radius:8px;
  font-family:'Karla',sans-serif;font-weight:700;font-size:12.5px;padding:5px 10px;
  box-shadow:0 4px 12px rgba(0,0,0,.25)}
.leaflet-tooltip-top.tt::before{border-top-color:var(--tinta)}

/* ---------- Controles del mapa ---------- */
#mapctl{position:fixed;z-index:1000;left:50%;transform:translateX(-50%);bottom:26px;display:flex;gap:8px;align-items:flex-end}
#basemaps{display:flex;background:var(--papel);border:1px solid var(--linea);border-radius:12px;
  overflow:hidden;box-shadow:var(--sombra)}
#basemaps button{padding:9px 13px;border:none;background:transparent;font:inherit;font-size:12.5px;
  font-weight:700;color:var(--tinta);cursor:pointer}
#basemaps button.on{background:var(--tinta);color:#fff}
.mbtn{width:40px;height:40px;border-radius:12px;border:1px solid var(--linea);background:var(--papel);
  box-shadow:var(--sombra);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tinta)}
.mbtn:hover{background:#fff}

/* ---------- Ficha ---------- */
#ficha{position:fixed;z-index:1100;top:0;right:0;height:100dvh;width:min(430px,100vw);
  background:var(--papel);box-shadow:-14px 0 40px rgba(20,30,15,.25);
  transform:translateX(105%);transition:transform .3s cubic-bezier(.32,.72,.32,1);
  display:flex;flex-direction:column}
#ficha.abierta{transform:translateX(0)}
#fichaScroll{overflow-y:auto;flex:1;scrollbar-width:thin}
#fichaHero{position:relative;height:225px;background:var(--papel-2)}
#fichaHero img{width:100%;height:100%;object-fit:cover;display:block}
#fichaHero::after{content:"";position:absolute;inset:0;
  background:linear-gradient(to top,rgba(20,28,15,.62) 0%,transparent 55%)}
#fichaCerrar{position:absolute;z-index:2;top:12px;right:12px;width:34px;height:34px;border-radius:50%;
  border:none;background:rgba(253,250,242,.92);color:var(--tinta);font-size:16px;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.25)}
#fichaTitulo{position:absolute;z-index:2;left:18px;right:56px;bottom:14px;color:#fff}
#fichaTitulo .badge{--c:#333;display:inline-flex;align-items:center;gap:6px;padding:4px 10px;
  border-radius:999px;background:var(--c);color:#fff;font-size:11px;font-weight:800;
  letter-spacing:.08em;text-transform:uppercase}
#fichaTitulo h2{font-family:'Fraunces',serif;font-weight:650;font-size:23px;line-height:1.1;
  margin-top:7px;text-shadow:0 2px 10px rgba(0,0,0,.45)}
#fichaBody{padding:18px}
#fichaBody .intro{font-size:14.5px;line-height:1.62}
.acciones{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.acciones a,.acciones button{flex:1;min-width:150px;display:flex;align-items:center;justify-content:center;gap:7px;
  padding:10px 12px;border-radius:11px;text-decoration:none;font:inherit;font-weight:700;font-size:13.5px;
  border:1.5px solid var(--tinta);color:var(--tinta);background:transparent;cursor:pointer}
.acciones .prim{background:var(--tinta);color:#fff}
.acciones a:hover,.acciones button:hover{filter:brightness(1.12)}
.seccion{margin-top:24px;padding-top:18px;border-top:1px dashed var(--linea)}
.seccion h3{font-family:'Fraunces',serif;font-weight:650;font-size:17.5px;display:flex;align-items:center;gap:8px}
.seccion h3 i{width:10px;height:10px;border-radius:3px;background:var(--acc,var(--sabana));flex:none;transform:rotate(45deg)}
.seccion p{font-size:14px;line-height:1.62;margin-top:8px}
.seccion video{width:100%;margin-top:12px;border-radius:12px;background:#0d130a;display:block;aspect-ratio:16/10}
.galeria{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.galeria img{width:100%;height:130px;object-fit:cover;border-radius:12px;background:var(--papel-2)}
.galeria img:only-child{grid-column:1/-1;height:170px}
#fichaBody footer{margin:26px 0 10px;text-align:center;font-size:11.5px;color:#8a927e}

/* Ficha de ruta */
#fichaBody .rutaMeta{display:flex;gap:16px;margin-top:6px;font-size:13.5px;color:#5d6653}
#fichaBody .rutaMeta b{color:var(--tinta);font-size:16px}
.paradas{margin-top:16px;display:flex;flex-direction:column}
.parada{display:grid;grid-template-columns:26px 1fr;gap:11px;align-items:start;
  padding:9px 0;cursor:pointer;border:none;background:none;text-align:left;font:inherit;color:inherit}
.parada:hover b{text-decoration:underline}
.parada .num{width:24px;height:24px;border-radius:50%;background:var(--corocora);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;position:relative}
.parada:not(:last-child) .num::after{content:"";position:absolute;top:24px;left:50%;width:2px;height:22px;
  background:var(--linea);transform:translateX(-50%)}
.parada b{font-size:14px}
.parada small{display:block;font-size:11.5px;color:#6b7562;margin-top:1px}
.aviso{margin-top:14px;padding:10px 12px;border-radius:10px;background:var(--papel-2);
  font-size:12.5px;line-height:1.5;color:#5d6653}

@media (max-width:720px){
  #panel{top:10px;left:10px;width:calc(100vw - 20px);max-height:74dvh}
  #brand{padding:10px 12px}
  #logo{width:40px;height:40px}
  #brand .eyebrow{font-size:9.5px}
  #brand h1{font-size:17px}
  #brand p{display:none}
  #brand .horizonte{display:none}
  #controles{padding:9px 12px 8px}
  #q{padding:8px 10px 8px 32px;font-size:13.5px}
  #chips{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;margin-top:8px;
    -webkit-overflow-scrolling:touch;scrollbar-width:none}
  #chips::-webkit-scrollbar{display:none}
  .chip{flex:none;white-space:nowrap}
  #seleccion{margin-top:8px}
  #lista{min-height:34dvh}
  #rutaBar{padding:8px 10px}
  #btnRuta{padding:9px 10px;font-size:13px}
  #mapctl{left:50%;transform:translateX(-50%);bottom:16px}
  #ficha{top:auto;bottom:0;right:0;left:0;width:100vw;height:86dvh;
    border-radius:18px 18px 0 0;transform:translateY(105%)}
  #ficha.abierta{transform:translateY(0)}
  #fichaHero{height:185px}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none !important;animation:none !important}
}
:focus-visible{outline:2.5px solid var(--corocora);outline-offset:2px}
</style>
</head>
<body>

<div id="map" role="application" aria-label="Mapa turístico de San Martín de los Llanos"></div>

<aside id="panel">
  <div id="brand">
    <button id="togglePanel" aria-label="Minimizar panel" title="Minimizar / expandir">–</button>
    <img id="logo" src="https://scontent.fbog3-1.fna.fbcdn.net/v/t39.30808-6/689473597_1084799354721023_5063654735419939594_n.jpg?stp=dst-jpg_tt6&cstp=mx720x720&ctp=s720x720&_nc_cat=108&_nc_map=urlgen_bucketless&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=0Nham2TxIi4Q7kNvwG5bYvV&_nc_oc=AdrME7lwmqhfpnnkNtRnZjQqV1Iw1lqrzl298yYLGhtmtSBigl6uPwfNavgnckvp1bU&_nc_zt=23&_nc_ht=scontent.fbog3-1.fna&_nc_gid=ZkAhzAQQ18GfO6rIli3J3w&_nc_ss=7a2a8&oh=00_AQAMg62TbcvdNRsQGkfLQUCR3lf_4XssQloMb8lqpg1vEg&oe=6A60322E" alt="El Refugio de Algazara" onerror="this.style.display='none'">

    </div>
    <svg class="horizonte" viewBox="0 0 360 26" preserveAspectRatio="none" aria-hidden="true">
      <circle cx="315" cy="20" r="11" fill="#f0b34a" opacity=".9"/>
      <path d="M0 23 Q 90 17 180 21 T 360 20 L360 26 L0 26 Z" fill="#22301d" opacity=".55"/>
      <path d="M255 8 q3.4 -4 7.5 -.8 q4.1 -3.2 7.5 .8" stroke="#fdfaf2" stroke-width="1.4" fill="none" stroke-linecap="round" opacity=".85"/>
    </svg>
  </div>
  <div id="controles">
    <div id="buscador">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="q" type="search" placeholder="Buscar un lugar…" aria-label="Buscar un lugar">
    </div>
    <div id="chips" role="group" aria-label="Filtrar por categoría"></div>

    <button id="btnRuta" type="button">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19c3-1 4-3 3-6s0-5 3-6 7-1 10 1"/><circle cx="4" cy="19" r="2"/><circle cx="20" cy="8" r="2"/></svg>

  </div>
</aside>

<div id="mapctl">
  <div id="basemaps">
    <button id="bmMapa" class="on" type="button">Mapa</button>
    <button id="bmSat" type="button">Satélite</button>
  </div>
  <button class="mbtn" id="btnHome" type="button" title="Ver todo el municipio" aria-label="Ver todo el municipio">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5.5 9.5V21h13V9.5"/></svg>
  </button>
  <button class="mbtn" id="btnGeo" type="button" title="Mi ubicación" aria-label="Mostrar mi ubicación">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="3.2"/><path d="M12 2v3.2M12 18.8V22M2 12h3.2M18.8 12H22"/></svg>
  </button>
</div>

<section id="ficha" aria-label="Ficha del lugar" aria-hidden="true">
  <div id="fichaScroll">
    <div id="fichaHero">
      <img id="fichaImg" alt="">
      <button id="fichaCerrar" aria-label="Cerrar ficha">✕</button>
      <div id="fichaTitulo">
        <span class="badge" id="fichaBadge"></span>
        <h2 id="fichaNombre"></h2>
      </div>
    </div>
    <div id="fichaBody"></div>
  </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

const PLACES = [
 {

 },

const CATS = {
  monumento:   { label:"Monumentos",        color:"#d63d2a" },
  turistico:   { label:"Sitios turísticos", color:"#2f7a4b" },
  gastronomico:{ label:"Gastronomía",       color:"#dd8624" },
  hospedaje:   { label:"Hospedaje",         color:"#2e6f92" },
  artesanos:   { label:"Artesanos",         color:"#7a58a8" }
};

/* ---------- Mapa base ---------- */
const map = L.map("map", { zoomControl:false, attributionControl:true })
  .setView([3.6975, -73.6955], 15);
L.control.zoom({ position:"bottomright" }).addTo(map);

const capaMapa = L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
  maxZoom: 20,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
}).addTo(map);
const capaSat = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
  maxZoom: 19,
  attribution: "Tiles &copy; Esri — Maxar, Earthstar Geographics"
});
document.getElementById("bmMapa").addEventListener("click", () => cambiarBase("mapa"));
document.getElementById("bmSat").addEventListener("click", () => cambiarBase("sat"));
function cambiarBase(cual){
  const esSat = cual === "sat";
  if (esSat){ map.removeLayer(capaMapa); capaSat.addTo(map); }
  else { map.removeLayer(capaSat); capaMapa.addTo(map); }
  document.getElementById("bmMapa").classList.toggle("on", !esSat);
  document.getElementById("bmSat").classList.toggle("on", esSat);
}

/* ---------- Marcadores (iconos originales) ---------- */
const marcadores = {};
const grupo = L.featureGroup().addTo(map);

PLACES.forEach(p => {
  const icon = L.divIcon({
    className: "",
    html: `<div class="icnwrap" id="icn-${p.ID}"><img src="${p.icono}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{style:'width:26px;height:26px;margin:7px auto;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${CATS[p.tipo].color};border:2px solid #fff'}))"></div>`,
    iconSize: [56, 40],
    iconAnchor: [28, 36],
    tooltipAnchor: [0, -34]
  });
  const m = L.marker(p.coords, { icon, keyboard:true, title:p.nombre, riseOnHover:true });
  m.bindTooltip(p.nombre, { direction:"top", className:"tt", opacity:1 });
  m.on("click", () => abrirFicha(p.ID));
  marcadores[p.ID] = m;
  m.addTo(grupo);
});

const vistaInicial = grupo.getBounds().pad(0.12);
map.fitBounds(vistaInicial);
document.getElementById("btnHome").addEventListener("click", () => {
  cerrarFicha();
  map.flyToBounds(vistaInicial, { duration:.8 });
});

/* ---------- Estado: filtros, búsqueda y selección ---------- */
const estado = {
  cat:"todos",
  q:"",
  sel: new Set(PLACES.map(p => p.ID))   /* al abrir, todos seleccionados */
};
const norm = s => (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");

const chipsEl = document.getElementById("chips");
function pintarChips(){
  let html = `<button class="chip ${estado.cat==="todos"?"on":""}" data-cat="todos" style="--c:#22301d">
    <span class="dot"></span>Todos <span class="n">${PLACES.length}</span></button>`;
  for (const [k,v] of Object.entries(CATS)){
    const n = PLACES.filter(p=>p.tipo===k).length;
    html += `<button class="chip ${estado.cat===k?"on":""}" data-cat="${k}" style="--c:${v.color}">
      <span class="dot"></span>${v.label} <span class="n">${n}</span></button>`;
  }
  chipsEl.innerHTML = html;
}
chipsEl.addEventListener("click", e => {
  const b = e.target.closest(".chip");
  if (!b) return;
  estado.cat = b.dataset.cat;
  pintarChips(); refrescar(true);
});
document.getElementById("q").addEventListener("input", e => {
  estado.q = norm(e.target.value.trim());
  refrescar(false);
});

/* lugares que pasan el filtro de categoría + búsqueda (lo que se ve en la lista) */
function enLista(){
  return PLACES.filter(p =>
    (estado.cat === "todos" || p.tipo === estado.cat) &&
    (!estado.q || norm(p.nombre).includes(estado.q) || norm(p.descripcion).includes(estado.q))
  );
}
/* lugares visibles en el mapa = seleccionados (la selección manda) */
function enMapa(){ return PLACES.filter(p => estado.sel.has(p.ID)); }

const listaEl = document.getElementById("lista");
function refrescar(volar){
  const lista = enLista();
  const idsMapa = new Set(estado.sel);

  for (const p of PLACES){
    const m = marcadores[p.ID];
    if (idsMapa.has(p.ID)) { if (!grupo.hasLayer(m)) m.addTo(grupo); }
    else { grupo.removeLayer(m); }
  }

  listaEl.innerHTML = lista.map(p => `
    <div class="tarjeta ${estado.sel.has(p.ID)?"":"apagada"}" data-id="${p.ID}" id="card-${p.ID}" tabindex="0" role="button" aria-label="${p.nombre}">
      <input type="checkbox" data-check="${p.ID}" ${estado.sel.has(p.ID)?"checked":""} aria-label="Incluir ${p.nombre} en el mapa">
      <img src="${p.imagen}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
      <span><b>${p.ID}. ${p.nombre}</b>
      <small><i style="background:${CATS[p.tipo].color}"></i>${CATS[p.tipo].label}</small></span>
    </div>`).join("");

  document.getElementById("sinResultados").style.display = lista.length ? "none" : "block";
  document.getElementById("cntSel").textContent = estado.sel.size;

  const btn = document.getElementById("btnRuta");
  btn.disabled = estado.sel.size < 2;
  document.getElementById("btnRutaTxt").textContent =
    estado.sel.size < 2 ? "Trazar recorrido (elige 2+)" : `Trazar recorrido (${estado.sel.size})`;

  if (ruta.activa) quitarRuta();

  if (volar && estado.sel.size){
    const b = L.featureGroup(enMapa().map(p=>marcadores[p.ID])).getBounds().pad(0.15);
    map.flyToBounds(b, { duration:.7, maxZoom:17 });
  }
}

/* ---------- Recorrido (ruta con los seleccionados) ---------- */
const ruta = { activa:false, linea:null, badges:[], orden:[] };

function havKm(a, b){
  const R = 6371, rad = x => x*Math.PI/180;
  const dLat = rad(b[0]-a[0]), dLon = rad(b[1]-a[1]);
  const s = Math.sin(dLat/2)**2 + Math.cos(rad(a[0]))*Math.cos(rad(b[0]))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
function ordenarParadas(pts){
  const n = pts.length;
  if (n <= 2) return pts.map((_,i)=>i);
  const D = pts.map(a => pts.map(b => havKm(a.coords, b.coords)));
  let mejor = null, mejorD = Infinity;
  for (let ini = 0; ini < n; ini++){           /* vecino más cercano desde cada inicio */
    const orden = [ini], usados = new Set([ini]);
    let d = 0;
    while (orden.length < n){
      const ult = orden[orden.length-1];
      let sig = -1, sd = Infinity;
      for (let j = 0; j < n; j++)
        if (!usados.has(j) && D[ult][j] < sd){ sd = D[ult][j]; sig = j; }
      orden.push(sig); usados.add(sig); d += sd;
    }
    if (d < mejorD){ mejorD = d; mejor = orden; }
  }
  let mejora = true;                            /* 2-opt */
  while (mejora){
    mejora = false;
    for (let i = 0; i < n-2; i++){
      for (let k = i+1; k < n-1; k++){
        const a=mejor[i], b=mejor[i+1], c=mejor[k], d2=mejor[k+1];
        if (D[a][c] + D[b][d2] < D[a][b] + D[c][d2] - 1e-9){
          mejor = mejor.slice(0,i+1).concat(mejor.slice(i+1,k+1).reverse(), mejor.slice(k+1));
          mejora = true;
        }
      }
    }
  }
  return mejor;
}

document.getElementById("btnRuta").addEventListener("click", trazarRuta);
document.getElementById("btnQuitarRuta").addEventListener("click", () => { quitarRuta(); cerrarFicha(); });

function trazarRuta(){
  quitarRuta();
  const pts = enMapa();
  if (pts.length < 2) return;
  const orden = ordenarParadas(pts).map(i => pts[i]);

  let km = 0;
  for (let i = 0; i < orden.length-1; i++) km += havKm(orden[i].coords, orden[i+1].coords);
  const kmCalle = km * 1.3;   /* factor aproximado por cuadrícula de calles */

  ruta.linea = L.polyline(orden.map(p=>p.coords), {
    color:"#d63d2a", weight:4, opacity:.9, dashArray:"2 9", lineCap:"round"
  }).addTo(map);

  orden.forEach((p, i) => {
    const b = L.marker(p.coords, {
      interactive:false,
      icon: L.divIcon({ className:"", html:`<div class="orden">${i+1}</div>`, iconSize:[22,22], iconAnchor:[-6,48] })
    }).addTo(map);
    ruta.badges.push(b);
  });

  ruta.activa = true;
  ruta.orden = orden;
  document.getElementById("btnQuitarRuta").style.display = "block";
  map.flyToBounds(ruta.linea.getBounds().pad(0.18), { duration:.8 });
  mostrarFichaRuta(orden, kmCalle);
}

function quitarRuta(){
  if (ruta.linea) map.removeLayer(ruta.linea);
  ruta.badges.forEach(b => map.removeLayer(b));
  ruta.linea = null; ruta.badges = []; ruta.activa = false; ruta.orden = [];
  document.getElementById("btnQuitarRuta").style.display = "none";
}

function mostrarFichaRuta(orden, km){
  const min = Math.round(km/4.5*60);            /* caminando ~4.5 km/h */
  const nStops = orden.length;
  let gmapsBtn = "";
  if (nStops <= 11){
    const o = orden[0].coords, d = orden[nStops-1].coords;
    const wp = orden.slice(1,-1).map(p=>p.coords.join(",")).join("|");
    const url = `https://www.google.com/maps/dir/?api=1&origin=${o.join(",")}&destination=${d.join(",")}${wp?`&waypoints=${encodeURIComponent(wp)}`:""}&travelmode=walking`;
    gmapsBtn = `<a class="prim" href="${url}" target="_blank" rel="noopener">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.2-7-11a7 7 0 1 1 14 0c0 4.8-7 11-7 11Z"/><circle cx="12" cy="10" r="2.6"/></svg>
      Abrir en Google Maps</a>`;
  }

  document.getElementById("fichaImg").src = orden[0].imagen;
  document.getElementById("fichaNombre").textContent = "Tu recorrido";
  const badge = document.getElementById("fichaBadge");
  badge.textContent = `${nStops} paradas`;
  badge.style.setProperty("--c", "#d63d2a");

  let html = `<div class="rutaMeta">
      <span><b>${km.toFixed(1)} km</b> aprox.</span>
      <span><b>~${min} min</b> caminando</span>
    </div>
    <div class="acciones">${gmapsBtn}
      <button type="button" id="btnQuitarRuta2">Quitar recorrido</button>
    </div>
    <div class="paradas">` +
    orden.map((p,i)=>`
      <button class="parada" data-id="${p.ID}" type="button">
        <span class="num">${i+1}</span>
        <span><b>${p.nombre}</b><small>${CATS[p.tipo].label}</small></span>
      </button>`).join("") +
    `</div>
    <p class="aviso">El orden se calcula para que camines lo menos posible entre paradas. Las distancias son en línea recta ajustadas a la cuadrícula del pueblo; para la ruta exacta calle a calle usa el botón de Google Maps${nStops>11?" (disponible con máximo 11 paradas)":""}.</p>
    <footer>Un recorrido de El Refugio de Algazara · San Martín de los Llanos</footer>`;

  const fBody = document.getElementById("fichaBody");
  fBody.innerHTML = html;
  fBody.querySelector("#btnQuitarRuta2").addEventListener("click", () => { quitarRuta(); cerrarFicha(); });
  fBody.querySelectorAll(".parada").forEach(el =>
    el.addEventListener("click", () => abrirFicha(+el.dataset.id)));

  abrirDrawer();
}

/* ---------- Ficha de lugar ---------- */
const ficha = document.getElementById("ficha");
const fBody = document.getElementById("fichaBody");
let idAbierto = null;

function tituloSeccion2(tipo){
  if (tipo === "gastronomico" || tipo === "artesanos") return "Una probadita del lugar";
  if (tipo === "hospedaje") return "Así es la experiencia";
  return "¿Qué se encuentra aquí?";
}

function abrirDrawer(){
  ficha.classList.add("abierta");
  ficha.setAttribute("aria-hidden","false");
  document.getElementById("fichaScroll").scrollTop = 0;
}

function abrirFicha(id){
  const p = PLACES.find(x => x.ID === id);
  if (!p) return;
  const cat = CATS[p.tipo];

  if (idAbierto !== null) document.getElementById("icn-"+idAbierto)?.classList.remove("sel");
  idAbierto = id;
  document.getElementById("icn-"+id)?.classList.add("sel");
  document.querySelectorAll(".tarjeta.activa").forEach(t=>t.classList.remove("activa"));
  document.getElementById("card-"+id)?.classList.add("activa");

  document.getElementById("fichaImg").src = p.imagen;
  document.getElementById("fichaNombre").textContent = `${p.ID}. ${p.nombre}`;
  const badge = document.getElementById("fichaBadge");
  badge.textContent = cat.label;
  badge.style.setProperty("--c", cat.color);

  const gmaps = `https://www.google.com/maps/dir/?api=1&destination=${p.coords[0]},${p.coords[1]}&travelmode=walking`;
  const enSel = estado.sel.has(p.ID);
  const secciones = [
    { t:"¿Dónde queda ubicado?", txt:p.texto_1, vid:p.video_1 },
    { t:tituloSeccion2(p.tipo),  txt:p.texto_2, vid:p.video_2 },
    { t:"Veamos algunos eventos", txt:p.texto_3, vid:p.video_3 }
  ].filter(s => (s.txt && s.txt.trim()) || (s.vid && s.vid.trim()));

  let html = `<p class="intro">${p.descripcion}</p>`;
  if (p.imagen2) html += `<div class="galeria"><img src="${p.imagen2}" alt="Fotografía de ${p.nombre}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`;
  html += `<div class="acciones">
    <a class="prim" href="${gmaps}" target="_blank" rel="noopener">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.2-7-11a7 7 0 1 1 14 0c0 4.8-7 11-7 11Z"/><circle cx="12" cy="10" r="2.6"/></svg>
      Cómo llegar</a>
    <button type="button" id="btnSelFicha">${enSel ? "✓ En tu recorrido" : "+ Agregar al recorrido"}</button>
  </div>`;
  for (const s of secciones){
    html += `<div class="seccion" style="--acc:${cat.color}">
      <h3><i></i>${s.t}</h3>
      ${s.txt && s.txt.trim() ? `<p>${s.txt}</p>` : ""}
      ${s.vid && s.vid.trim() ? `<video controls preload="none" playsinline src="${s.vid}"></video>` : ""}
    </div>`;
  }
  html += `<footer>Mapa turístico de San Martín de los Llanos · El Refugio de Algazara</footer>`;
  fBody.innerHTML = html;

  fBody.querySelector("#btnSelFicha").addEventListener("click", e => {
    const ya = estado.sel.has(p.ID);
    ya ? estado.sel.delete(p.ID) : estado.sel.add(p.ID);
    e.target.textContent = ya ? "+ Agregar al recorrido" : "✓ En tu recorrido";
    refrescar(false);
    document.getElementById("icn-"+p.ID)?.classList.add("sel");
  });

  abrirDrawer();

  const esMovil = window.matchMedia("(max-width:720px)").matches;
  map.flyTo(p.coords, Math.max(map.getZoom(), 17), { duration:.8 });
  setTimeout(()=> map.panBy([esMovil ? 0 : 215, esMovil ? window.innerHeight*0.22 : 0], { animate:true }), 850);
}

function cerrarFicha(){
  ficha.classList.remove("abierta");
  ficha.setAttribute("aria-hidden","true");
  fBody.querySelectorAll("video").forEach(v => v.pause());
  if (idAbierto !== null) document.getElementById("icn-"+idAbierto)?.classList.remove("sel");
  document.querySelectorAll(".tarjeta.activa").forEach(t=>t.classList.remove("activa"));
  idAbierto = null;
}
document.getElementById("fichaCerrar").addEventListener("click", cerrarFicha);
document.addEventListener("keydown", e => { if (e.key === "Escape") cerrarFicha(); });

/* ---------- Geolocalización ---------- */
let miMarca = null;
document.getElementById("btnGeo").addEventListener("click", () => {
  if (!navigator.geolocation) return alert("Tu navegador no permite geolocalización.");
  navigator.geolocation.getCurrentPosition(pos => {
    const ll = [pos.coords.latitude, pos.coords.longitude];
    if (miMarca) map.removeLayer(miMarca);
    miMarca = L.circleMarker(ll, { radius:8, color:"#fff", weight:2.5, fillColor:"#1d6fd1", fillOpacity:1 })
      .addTo(map).bindTooltip("Estás aquí", { className:"tt", direction:"top" });
    map.flyTo(ll, 16, { duration:.8 });
  }, () => alert("No pudimos obtener tu ubicación. Revisa los permisos del navegador."));
});

/* ---------- Arranque ---------- */
pintarChips();
refrescar(false);
map.fitBounds(vistaInicial);
</script>
